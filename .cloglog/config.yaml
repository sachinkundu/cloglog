project: cloglog
project_id: 4d9e825a-c911-4110-bcd5-9072d1887813
backend_url: http://127.0.0.1:8001
prod_worktree_path: ../cloglog-prod
quality_command: make quality
dashboard_key: cloglog-dashboard-dev
webhook_tunnel_name: cloglog-webhooks

# GitHub App identifiers (gh_app_id / gh_app_installation_id) live in the
# gitignored .cloglog/local.yaml — they are operator-host-specific and must
# not be tracked. See plugins/cloglog/docs/setup-credentials.md (T-348).

# Auto-merge-eligible final-stage reviewer bots only. The two-stage review
# pipeline (docs/design/two-stage-pr-review.md) runs opencode first (stage A)
# then codex (stage B); only codex's `:pass:` may auto-merge. Opencode is
# intentionally absent here — its approvals route through the standard
# review_submitted in_progress flow.
reviewer_bot_logins:
  - cloglog-codex-reviewer[bot]

# demo_allowlist_paths is a single regex (joined alternation) read by
# scripts/check-demo.sh and the demo skill. Stored as a YAML scalar so the
# scalar reader at plugins/cloglog/hooks/lib/parse-yaml-scalar.sh handles
# it without a YAML list parser.
demo_allowlist_paths: '^docs/|^CLAUDE\.md|^\.claude/|^\.cloglog/|^scripts/|^\.github/|^tests/|^Makefile$|^plugins/[^/]+/(hooks|skills|agents|templates)/|^pyproject\.toml$|^ruff\.toml$|package-lock\.json$|\.lock$'

# T-358: desktop-toast dispatcher knobs. ``desktop_toast_enabled`` is the
# operator off-switch (toasts disabled if false); ``desktop_toast_stall_minutes``
# is the auto-merge stall threshold for the StallDebouncer. Read by
# src/gateway/notification_listener.py:load_toast_config via the stdlib
# scalar reader (no PyYAML -- docs/invariants.md hook YAML parsing entry).
desktop_toast_enabled: true
desktop_toast_stall_minutes: 15

worktree_scopes:
  board: [src/board/, tests/board/, src/alembic/]
  agent: [src/agent/, tests/agent/, src/alembic/]
  document: [src/document/, tests/document/, src/alembic/]
  gateway: [src/gateway/, tests/gateway/, src/shared/]
  frontend: [frontend/]
  mcp: [mcp-server/]
  assign: [src/gateway/, src/board/, tests/gateway/, tests/board/]
  e2e: [tests/e2e/]
