name: Init Smoke

# Plugin portability gate. Runs on every PR (no paths filter) so a change
# anywhere in the tree — plugin skills, hooks, settings, docs — cannot ship
# a portability regression that breaks `init` on a fresh downstream repo.
#
# Pin tests executed:
#   - tests/plugins/test_init_on_fresh_repo.py    (T-319/T-321 placeholder + scope-template behaviour)
#   - tests/plugins/test_plugin_no_cloglog_citations.py (T-323 host-literal sweep)

on:
  pull_request:
    branches: [main]

concurrency:
  group: init-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  init-smoke:
    runs-on: ubuntu-latest

    # tests/conftest.py has a session-autouse fixture that opens a Postgres
    # connection before any test in the suite runs (T-324). The plugin pin
    # tests below don't touch the DB, but pytest still triggers the fixture,
    # so the smoke job needs a Postgres service even though the assertions
    # themselves are static-file pins.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloglog
          POSTGRES_PASSWORD: cloglog_dev
          POSTGRES_DB: cloglog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloglog"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Fresh-repo init smoke
        run: |
          uv run pytest \
            tests/plugins/test_init_on_fresh_repo.py \
            tests/plugins/test_plugin_no_cloglog_citations.py \
            tests/plugins/test_skills_no_remote_set_url.py \
            tests/plugins/test_launch_skill_exports_gh_app_env.py \
            tests/plugins/test_launch_skill_renders_clean_launch_sh.py \
            tests/plugins/test_launch_skill_has_agent_started_timeout.py \
            tests/plugins/test_agent_prompt_template_correct_inbox_paths.py \
            -v --no-cov --tb=short
