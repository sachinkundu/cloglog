components:
  schemas:
    DependencyCreate:
      description: >-
        Request body for adding a dependency. Used by both the feature-dep
        routes (POST /features/{id}/dependencies) and the task-dep routes
        (POST /tasks/{id}/dependencies).
      properties:
        depends_on_id:
          type: string
          format: uuid
          title: Depends On Id
      type: object
      required:
      - depends_on_id
      title: DependencyCreate
    BacklogEpic:
      properties:
        epic:
          $ref: '#/components/schemas/EpicResponse'
        features:
          items:
            $ref: '#/components/schemas/BacklogFeature'
          type: array
          title: Features
        task_counts:
          $ref: '#/components/schemas/TaskCounts'
      type: object
      required:
      - epic
      - features
      - task_counts
      title: BacklogEpic
    BacklogFeature:
      properties:
        feature:
          $ref: '#/components/schemas/FeatureResponse'
        tasks:
          items:
            $ref: '#/components/schemas/BacklogTask'
          type: array
          title: Tasks
        task_counts:
          $ref: '#/components/schemas/TaskCounts'
